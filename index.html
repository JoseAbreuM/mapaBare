<!DOCTYPE html>
<meta name="theme-color" content="#ffcc00">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pozos - Offline</title>
    <link rel="manifest" href="manifest.json">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/styles.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-init.js"></script>
</head>
<body>
    <header class="app-header">
        <div class="controls">
            <input id="search-input" class="desktop-only" list="pozos-list" placeholder="Buscar pozo ID..." autocomplete="off">
            <datalist id="pozos-list"></datalist>

            <select id="zone-select" class="mobile-show">
                <option value="bare-tradicional">BARE tradicional</option>
                <option value="bare-6-1">BARE 6-1</option>
                <option value="bare-6-2">BARE 6-2</option>
                <option value="trilla-asfaltada">Trilla Asfaltada</option>
            </select>

            <label class="switch">
                <input type="checkbox" id="edit-mode">
                <span class="slider"></span>
                <span class="label">Modo edición</span>
            </label>
            <button id="assign-taladro-btn">Asignar Taladro</button>
        </div>
    </header>

    <aside id="stats-panel" class="stats-panel">
        <h2>Estadísticas</h2>
        <p>Activos: <span id="count-active">0</span></p>
        <p>Inactivos: <span id="count-inactive">0</span></p>
        <p>Revisión: <span id="count-review">0</span></p>
    </aside>

    <main>
        <div id="map" class="map-container"></div>
    </main>

    <!-- botón flotante para search -->
    <button id="open-search" class="open-search-btn">🔍</button>

    <!-- search flotante -->
    <div id="search-float" class="search-float hidden">
        <input id="float-search" list="pozos-list" placeholder="Buscar pozo ID...">
        <button id="float-search-btn">Buscar</button>
        <button id="close-search">✕</button>
    </div>

    <!-- formulario oculto -->
    <div id="form-container" class="form-container hidden">
        <form id="pozo-form">
            <h3 id="form-title">Nuevo Pozo</h3>
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">
            <label>ID<br><input type="text" id="form-id" required></label>
            <label>Estado<br>
                <select id="form-estado">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                    <option value="revision">Revisión</option>
                </select>
            </label>
            <label>Cabezal<br>
                <select id="form-cabezal">
                    <option value="">Ninguno</option>
                    <option value="Weatherford">Weatherford</option>
                    <option value="tiger">Tiger</option>
                    <option value="hevei jerry">Hevei Jerry</option>
                    <option value="kudo">Kudo</option>
                    <option value="alta">Alta</option>
                    <option value="nezsht">Nezsht</option>
                    <option value="NOE">NOE</option>
                </select>
            </label>
            <label>Variador<br>
                <select id="form-variador">
                    <option value="">Ninguno</option>
                    <option value="Usefull">Usefull</option>
                    <option value="hevei jerry">Hevei Jerry</option>
                    <option value="combest">Combest</option>
                </select>
            </label>
            <div class="form-actions">
                <button type="submit">Guardar</button>
                <button type="button" id="form-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- formulario asignar taladro -->
    <div id="assign-form-container" class="form-container hidden">
        <form id="assign-taladro-form">
            <h3>Asignar Taladro</h3>
            <label>Pozo ID<br><input type="text" id="assign-pozo-id" required></label>
            <label>Taladro<br>
                <select id="assign-taladro-select">
                    <option value="357">357</option>
                    <option value="351">351</option>
                    <option value="352">352</option>
                    <option value="151">151</option>
                </select>
            </label>
            <div class="form-actions">
                <button type="submit">Asignar</button>
                <button type="button" id="assign-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- scripts -->
    <script src="js/leaflet.js"></script>
    <script src="js/main.js"></script>
    <script src="js/sw-register.js" defer></script>
</body>
</html>
