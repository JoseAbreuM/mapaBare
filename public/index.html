<!DOCTYPE html>
<meta name="theme-color" content="#020499">
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Pozos - Offline</title>
    <link rel="manifest" href="manifest.json">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/leaflet.css?v=3">
    <link rel="stylesheet" href="css/styles.css?v=5">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="js/firebase-init.js?v=3"></script>
</head>
<body>
    <header class="app-header">
        <div class="controls">
            <input id="search-input" class="desktop-only" list="pozos-list" placeholder="Buscar pozo ID..." autocomplete="off">
            <datalist id="pozos-list"></datalist>

            <select id="zone-select" class="mobile-show">
                <option value="bare-tradicional">BARE tradicional</option>
                <option value="bare-6">BARE 6</option>
                <option value="bare-6-norte">BARE 6-Norte</option>
                <option value="bare-este">Bare Este</option>
            </select>

            <label class="switch">
                <input type="checkbox" id="edit-mode">
                <span class="slider"></span>
                <span class="label">Modo edición</span>
            </label>
            <button id="assign-taladro-btn">Asignar Servicio</button>
            <span id="auth-user-label" class="auth-user-label hidden"></span>
            <button id="login-btn" type="button" class="auth-btn">Iniciar sesión</button>
            <button id="logout-btn" type="button" class="auth-btn hidden">Cerrar sesión</button>
        </div>
    </header>

    <aside id="stats-panel" class="stats-panel">
        <h2>Estadísticas</h2>
        <button type="button" class="stats-item is-active" data-filter="all">Total pozos: <span id="count-total">0</span></button>
        <button type="button" class="stats-item" data-filter="activo">Activos: <span id="count-active">0</span></button>
        <button type="button" class="stats-item" data-filter="inactivo-servicio">Inactivos por servicio: <span id="count-inactive-service">0</span></button>
        <button type="button" class="stats-item" data-filter="en-servicio">En servicio: <span id="count-in-service">0</span></button>
        <button type="button" class="stats-item" data-filter="diagnostico">En diagnóstico: <span id="count-diagnostic">0</span></button>
        <button type="button" class="stats-item" data-filter="candidato">Candidatos: <span id="count-candidate">0</span></button>
        <button type="button" class="stats-item" data-filter="diferido">Diferido: <span id="count-deferred">0</span></button>
    </aside>

    <main>
        <div id="map" class="map-container"></div>
    </main>

    <!-- formulario oculto -->
    <div id="form-container" class="form-container hidden">
        <form id="pozo-form">
            <h3 id="form-title">Nuevo Pozo</h3>
            <input type="hidden" id="form-lat">
            <input type="hidden" id="form-lng">
            <label>ID<br><input type="text" id="form-id" required></label>
            <label>Estado<br>
                <select id="form-estado">
                    <option value="activo">Activo</option>
                    <option value="inactivo-servicio">Inactivo por servicio</option>
                    <option value="en-servicio">En servicio</option>
                    <option value="diagnostico">En diagnóstico</option>
                    <option value="candidato">Candidato</option>
                    <option value="diferido">Diferido</option>
                </select>
            </label>
            <label id="form-diferido-cause-wrapper" class="hidden">Causa diferido<br><input type="text" id="form-diferido-cause" placeholder="Ej: arenamiento"></label>
            <label>Cabezal<br>
                <select id="form-cabezal">
                    <option value="">Ninguno</option>
                    <option value="Weatherford">Weatherford</option>
                    <option value="tiger">Tiger</option>
                    <option value="hebei jerry">Hebei Jerry</option>
                    <option value="kudu">Kudu</option>
                    <option value="altan">Altan</option>
                    <option value="netzsch">Netzsch</option>
                    <option value="nov">NOV</option>
                    <option value="lifteq">Lifteq</option>
                    <option value="baker-hughes">Baker Hughes</option>
                    <option value="pcm">PCM</option>
                    <option value="cavallino">Cavallino</option>
                    <option value="combest">Combest</option>
                    <option value="vipower">Vipower</option>
                    <option value="api">Al Pro International</option>
                </select>
            </label>
            <label>Variador<br>
                <select id="form-variador">
                    <option value="">Ninguno</option>
                    <option value="usfull">Usfull</option>
                    <option value="hebei jerry">Hebei Jerry</option>
                    <option value="matin dustrie">Matin Dustrie</option>
                    <option value="wsc">WSC</option>
                    <option value="yaskawa">Yaskawa</option>
                    <option value="delta">Delta</option>
                    <option value="abb">ABB</option>
                    <option value="altan">ALTAN</option>
                    <option value="combest">Combest</option>
                </select>
            </label>
            <label>Potencial (barriles)<br><input type="number" id="form-potencial" min="0" step="0.01"></label>
            <div class="form-actions">
                <button type="submit">Guardar</button>
                <button type="button" id="form-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- formulario asignar servicio -->
    <div id="assign-form-container" class="form-container hidden">
        <form id="assign-taladro-form">
            <h3>Asignar Servicio</h3>
            <label>Pozo ID<br><input type="text" id="assign-pozo-id" required></label>
            <label>Servicio<br>
                <select id="assign-taladro-select">
                    <option value="Ranger-357">Ranger-357</option>
                    <option value="RIG-351">RIG-351</option>
                    <option value="RIG-352">RIG-352</option>
                    <option value="Ranger-151">Ranger-151</option>
                    <option value="WT">WT</option>
                </select>
            </label>
            <div class="form-actions">
                <button type="submit">Asignar</button>
                <button type="button" id="assign-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- formulario login -->
    <div id="login-form-container" class="form-container hidden">
        <form id="login-form" autocomplete="on">
            <h3>Iniciar sesión</h3>
            <label>Usuario<br><input type="text" id="login-username" autocomplete="username" required></label>
            <label>Contraseña<br><input type="password" id="login-password" autocomplete="current-password" required></label>
            <p id="login-error" class="login-error hidden"></p>
            <div class="form-actions">
                <button type="submit">Entrar</button>
                <button type="button" id="login-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- verificacion del pozo que sale de servicio -->
    <div id="service-verification-container" class="form-container hidden">
        <form id="service-verification-form">
            <h3>Verificación de servicio</h3>
            <p id="verification-pozo-label" class="verification-subtitle"></p>

            <div class="radio-card-group">
                <label class="radio-card">
                    <input type="radio" name="verification-estado" value="activo" checked>
                    <span>Activo</span>
                </label>
                <label class="radio-card">
                    <input type="radio" name="verification-estado" value="candidato">
                    <span>Candidato</span>
                </label>
                <label class="radio-card">
                    <input type="radio" name="verification-estado" value="diferido">
                    <span>Diferido</span>
                </label>
            </div>

            <label id="verification-cause-wrapper" class="hidden">Causa diferido<br><input type="text" id="verification-cause" placeholder="Ej: arenamiento"></label>

            <div class="form-actions">
                <button type="submit">Confirmar</button>
                <button type="button" id="verification-cancel">Cancelar</button>
            </div>
        </form>
    </div>

    <!-- scripts -->
    <script src="js/leaflet.js?v=3"></script>
    <!-- localForage se carga antes de main.js; se agrega un query string para
         invalidar la cache cuando cambie de versión -->
    <script src="js/localforage.min.js?v=3" onerror="console.error('No se pudo cargar localforage desde el archivo local')"></script>
    <script>
        // Si localforage no está disponible (por cache antigua o fallos de SW),
        // tratamos de cargarlo desde un CDN y finalmente caer en un envoltorio
        // basado en localStorage para que la aplicación no se rompa.
        (function(){
            function fallbackToStorage(){
                console.warn('Usando fallback de localStorage');
                window.localforage = {
                    getItem: async function(key){
                        var v = localStorage.getItem(key);
                        return v ? JSON.parse(v) : null;
                    },
                    setItem: async function(key,value){
                        localStorage.setItem(key, JSON.stringify(value));
                        return value;
                    },
                    removeItem: async function(key){
                        localStorage.removeItem(key);
                    }
                };
            }
            if(typeof localforage === 'undefined'){
                var s = document.createElement('script');
                s.src = 'https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js';
                s.onload = function(){
                    if(typeof localforage === 'undefined'){
                        console.error('localforage no se definió aun después de cargar CDN');
                        fallbackToStorage();
                    }
                };
                s.onerror = function(){
                    console.error('Error cargando localforage desde CDN');
                    fallbackToStorage();
                };
                document.head.appendChild(s);
            }
        })();
    </script>
    <script src="js/pozos-data.js?v=1"></script>
    <script src="js/main.js?v=6"></script>
    <script src="js/sw-register.js?v=3" defer></script>

    <!-- Botón flotante de búsqueda para móvil -->
    <div id="floating-search-container">
        <button id="floating-search-btn" class="floating-search-btn">🔍</button>
        <div id="floating-search-input" class="floating-search-input hidden">
            <input id="mobile-search" list="pozos-list" placeholder="Buscar pozo ID...">
            <button id="mobile-search-btn">Buscar</button>
        </div>
    </div>

    <!-- Botón flotante para zona en móvil -->
    <div id="floating-zone-container">
        <button id="floating-zone-btn" class="floating-zone-btn">🗺️</button>
        <div id="floating-zone-input" class="floating-zone-input hidden">
            <select id="mobile-zone-select">
                <option value="bare-tradicional">BARE tradicional</option>
                <option value="bare-6">BARE 6</option>
                <option value="bare-6-norte">BARE 6-Norte</option>
                <option value="bare-este">Bare Este</option>
            </select>
        </div>
    </div>
</body>
</html>
